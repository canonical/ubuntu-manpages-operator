{{ define "title" }}Page not found — Ubuntu Manpages{{ end }}

{{ define "page-title" }}
<div class="l-docs__title" id="main-content"></div>
{{ end }}

{{ define "main" }}
<section class="p-section--hero">
  <div class="row--50-50">
    <div class="col">
      <h1>Page not found</h1>
    </div>
    <div class="col">
      <p>
        The page you requested could not be found. It may not have been ingested yet, or the URL
        may be incorrect.
      </p>
      <div class="p-cta-block">
        <a class="p-button--positive" href="{{ urlFor "/search" }}">Search manpages</a>
        <a class="p-button" href="{{ urlFor "/manpages" }}">Browse all releases</a>
      </div>
    </div>
  </div>
</section>
{{ end }}
